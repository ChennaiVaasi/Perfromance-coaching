<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Activity Branch</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="shell detail-shell">
      <a class="back-link" href="/">Back to dashboard</a>
      <section class="detail-grid">
        <article class="panel">
          <p class="panel-label">Activity Branch</p>
          <h1 id="activity-title">Loading activity...</h1>
          <p id="activity-summary" class="strapline"></p>
          <div class="summary-stack" id="activity-meta"></div>
        </article>

        <article class="panel">
          <p class="panel-label">Highlights</p>
          <div id="activity-highlights"></div>
        </article>

        <article class="panel">
          <p class="panel-label">Related Sessions</p>
          <div class="chart-session-grid" id="activity-sessions"></div>
        </article>
      </section>
    </main>
    <script src="./auth.js"></script>
    <script src="./activity.js"></script>
  </body>
</html>
