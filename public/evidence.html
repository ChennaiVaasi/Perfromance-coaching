<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Metric Evidence</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="shell detail-shell">
      <a class="back-link" href="/">Back to dashboard</a>
      <section class="detail-grid">
        <article class="panel">
          <p class="panel-label">Metric Evidence</p>
          <h1 id="detail-title">Loading metric...</h1>
          <p id="detail-summary" class="strapline"></p>
          <div class="summary-stack" id="detail-meta"></div>
        </article>

        <article class="panel">
          <p class="panel-label">Evidence Read</p>
          <div id="detail-body"></div>
        </article>

        <article class="panel">
          <p class="panel-label">Source Report</p>
          <div id="detail-source"></div>
        </article>
      </section>
    </main>
    <script src="./auth.js"></script>
    <script src="./evidence.js"></script>
  </body>
</html>
